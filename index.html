<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rating Request Form</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #eef2f5;
            padding: 30px;
            color: #333;

        }

        .container {    
             max-width: 1100px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);

        }

        h2 {
            color: #003366;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cfcfcf;
            border-radius: 4px;
            background: white;
            box-sizing: border-box;
        }

        input[readonly]{
            background:#f2f4f6;
            color:#555;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .section {
            display: none;
            margin-top: 20px;
            border-top: 2px solid #ddd;
            padding-top: 20px;
        }

        .required {
            color: red;
        }

       button {
            background-color: #007a3d;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        button:hover {
            background-color: #006534;
        }

    </style>
</head>
<body>

<div class="container">
  <!-- Requestor Information -->

<h3 style="color:#0b7a3e;border-bottom:2px solid #e5e5e5;padding-bottom:10px;">
    Requestor Information
</h3>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">

    <div class="form-group">
        <label>Requestor <span class="required">*</span></label>
        <input type="text" id="requestor">
    </div>

    <div class="form-group">
        <label>Location</label>
        <input type="text" id="locationAuto" readonly>
    </div>

    <div class="form-group">
        <label>PRN</label>
        <input type="text" id="prn">
    </div>

    <div class="form-group">
        <label>Date</label>
        <input type="text" id="dateAuto" readonly>
    </div>

    <div class="form-group">
        <label>Email Address</label>
        <input type="text" id="emailAuto" readonly>
    </div>

    <div class="form-group">
        <label>Cost Center Manager</label>
        <select>
            <option value="">-- Select Manager --</option>
            <option>Marwan Henawi</option>
            <option>Manager 2</option>
            <option>Manager 3</option>
        </select>
    </div>

    <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="phoneAuto" readonly>
    </div>

    <div class="form-group">
        <label>Department Director</label>
        <select>
            <option value="">-- Select Director --</option>
            <option>Director 1</option>
            <option>Director 2</option>
            <option>Director 3</option>
        </select>
    </div>

    <div></div>

    <div class="form-group">
        <label>Department <span class="required">*</span></label>
        <select>
            <option value="">-- Select Department --</option>
            <option>Technical Services</option>
            <option>Quality & Safety</option>
            <option>Engineering</option>
            <option>Planning</option>
            <option>Operations</option>
        </select>
    </div>

</div>

<hr style="margin:30px 0;">
    </dif>
    <h2>Add/Delete Rating Request</h2>

    <div class="form-group">
        <label for="requestType">Request Type</label>
        <select id="requestType" onchange="showSection()">
            <option value="">-- Select --</option>
            <option value="add">Add Rating</option>
            <option value="delete">Delete Rating</option>
        </select>
    </div>

    <!-- Add Rating Section -->
    <div id="addSection" class="section">
        <h3>Add Rating</h3>

        <div class="form-group">
            <label>A/C Type <span class="required">*</span></label>
            <input type="text">
        </div>

        <div class="form-group">
            <label>Authority <span class="required">*</span></label>
            <input type="text">
        </div>

        <div class="form-group">
            <label>Scope <span class="required">*</span></label>
            <input type="text">
        </div>

        <div class="form-group">
            <label>Customer <span class="required">*</span></label>
            <input type="text">
        </div>

        <div class="form-group">
            <label>Type of Maintenance <span class="required">*</span></label>
            <input type="text">
        </div>

        <div class="form-group">
            <label>Location <span class="required">*</span></label>
            <input type="text">
        </div>
    </div>

    <dif>
      
    <!-- Delete Rating Section -->
    <div id="deleteSection" class="section">
        <h3>Delete Rating</h3>

        <div class="form-group">
            <label>Justification <span class="required">*</span></label>
            <textarea></textarea>
        </div>

        <div class="form-group">
            <label>A/C Type <span class="required">*</span></label>
            <input type="text">
        </div>

        <div class="form-group">
            <label>Authority <span class="required">*</span></label>
            <input type="text">
        </div>

        <div class="form-group">
            <label>Scope <span class="required">*</span></label>
            <input type="text">
        </div>

        <div class="form-group">
            <label>Customer (Optional)</label>
            <input type="text">
        </div>

        <div class="form-group">
            <label>Type of Maintenance <span class="required">*</span></label>
            <input type="text">
        </div>

        <div class="form-group">
            <label>Location <span class="required">*</span></label>
            <input type="text">
        </div>
    </div>

    <br>
    <button type="submit">Submit</button>

</div>

<script>
    function showSection() {
        const type = document.getElementById("requestType").value;

        document.getElementById("addSection").style.display = "none";
        document.getElementById("deleteSection").style.display = "none";

        if (type === "add") {
            document.getElementById("addSection").style.display = "block";
        }

        if (type === "delete") {
            document.getElementById("deleteSection").style.display = "block";
        }
    }
        document.getElementById("dateAuto").value =
        new Date().toISOString().split("T")[0];
    
        document.getElementById("emailAuto").value =
            "name@saudiatechnic.com";
        
        document.getElementById("phoneAuto").value =
            "";
        
        document.getElementById("locationAuto").value =
            "Jeddah";
</script>

</body>
</html>
